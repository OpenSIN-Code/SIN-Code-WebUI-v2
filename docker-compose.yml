# Purpose: Self-hosted deployment for sincode-webui.delqhi.com.
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d --build
#   docker compose exec -T db psql -U sin -d sincode < scripts/001_init.sql

services:
  app:
    build:
      context: .
      args:
        SIN_CODE_REF: main
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # only nginx talks to it; not exposed publicly
    environment:
      SIN_UI_TOKEN: ${SIN_UI_TOKEN}
      DATABASE_URL: postgres://sin:${POSTGRES_PASSWORD}@db:5432/sincode
      AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY}
      SIN_MODEL_PRO: ${SIN_MODEL_PRO:-anthropic/claude-sonnet-4.5}
      SIN_MODEL_FAST: ${SIN_MODEL_FAST:-openai/gpt-5-mini}
      SIN_MODEL_MINI: ${SIN_MODEL_MINI:-google/gemini-3-flash}
      SIN_CODE_BIN: /usr/local/bin/sin-code
      SIN_DATA_DIR: /data
    volumes:
      - sin-data:/data            # file-store fallback + workspace state
      - sin-workspace:/workspace  # repo the sin-code agent operates on
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sincode
    volumes:
      - sin-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sin -d sincode"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sin-data:
  sin-pgdata:
  sin-workspace:
