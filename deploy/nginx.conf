# Purpose: nginx site config for sincode-webui.delqhi.com.
# Place at /etc/nginx/sites-available/sincode-webui and symlink to
# sites-enabled. TLS via certbot --nginx or your existing setup.

upstream sincode_webui {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name sincode-webui.delqhi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sincode-webui.delqhi.com;

    ssl_certificate     /etc/letsencrypt/live/sincode-webui.delqhi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sincode-webui.delqhi.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 10m;

    # SSE: orchestrator live stream — buffering must be off
    location /api/sin/orchestrator/stream {
        proxy_pass http://sincode_webui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding off;
    }

    # Chat streaming — long read timeout, no buffering for tokens
    location /api/chat {
        proxy_pass http://sincode_webui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 180s;
    }

    # Everything else
    location / {
        proxy_pass http://sincode_webui;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}
