# Purpose: CycloneDX SBOM for Node/TypeScript — generate on every release
# and upload as a release asset + workflow artifact.
#
# Required secrets: none (uses GITHUB_TOKEN)
# Triggers: release published, manual dispatch

name: sbom

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      format:
        description: 'SBOM format: cyclonedx-json | cyclonedx-xml | spdx-json'
        required: false
        default: 'cyclonedx-json'

permissions:
  contents: write
  actions: read

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM
        run: npx @cyclonedx/cdxgen --output bom.json --type node

      - name: Upload SBOM as release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: bom.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SBOM as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bom.json
          retention-days: 90
