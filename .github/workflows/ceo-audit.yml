# Purpose: CEO Audit — SOTA repository review (47 gates, 8 axes)
# Docs: https://github.com/OpenSIN-Code/SIN-Code-Bundle/tree/main/src/sin_code_bundle/skills/ceo-audit
#
# Runs the full CEO Audit on every push and PR. Posts a Markdown
# comment on the PR with the grade, top 3 risks, and a link to the
# full report. Fails if grade < B (configurable via --grade flag).
#
# NOTE: ceo-audit is a Python tool (sin-code-bundle). This repo is
# Node/TypeScript — we run the audit only if a Python manifest is
# present. Otherwise we emit a "no-audit-needed" comment so the
# branch-protection check still passes.
#
# Required secrets: none (uses built-in GITHUB_TOKEN)
# Optional inputs: profile (default: QUICK), grade (default: B)

name: ceo-audit

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Audit profile: QUICK | RELEASE | SECURITY | FULL'
        required: false
        default: 'QUICK'
      grade:
        description: 'Minimum grade to pass: A | B | C'
        required: false
        default: 'B'

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  ceo-audit:
    name: CEO Audit (${{ inputs.profile || 'QUICK' }}, grade≥${{ inputs.grade || 'B' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AUDIT_PROFILE: ${{ inputs.profile || 'QUICK' }}
      AUDIT_GRADE: ${{ inputs.grade || 'B' }}
      AUDIT_REPO: ${{ github.workspace }}
      AUDIT_RUN_ID: ${{ github.run_id }}
      AUDIT_SHA: ${{ github.sha }}
    steps:
      - name: Skip for dependabot dependency bumps
        if: github.actor == 'dependabot[bot]'
        run: |
          {
            echo "## CEO Audit — Skipped"
            echo ""
            echo "Dependabot pushed a dependency-version-only change."
            echo "These PRs do not modify application logic, so the 47-gate"
            echo "audit is bypassed. The PR is still gated by required reviews"
            echo "and by the test/dependabot-aggregator workflow."
          } > report.md
          exit 0

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for regression detection

      - name: Detect project type
        id: detect
        run: |
          if [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f setup.py ]; then
            echo "is_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_python=false" >> "$GITHUB_OUTPUT"
          fi
          echo "node_version=$(node --version 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"

      - name: Skip with explanatory comment (Node/TS repo, no Python manifest)
        if: steps.detect.outputs.is_python != 'true'
        run: |
          {
            echo "## CEO Audit — Not applicable"
            echo ""
            echo "This repository is a **Node.js / TypeScript** project."
            echo "The 47-gate CEO Audit is a Python tool; running it on a"
            echo "non-Python repo would produce a misleading grade."
            echo ""
            echo "**Recommended checks for this repo:**"
            echo "- \`pnpm tsc --noEmit\` (type safety)"
            echo "- \`pnpm lint\` (style)"
            echo "- \`pnpm test\` (unit tests, when added)"
            echo "- Dependabot \`npm\` updates (already configured)"
            echo ""
            echo "To enable ceo-audit on the entire monorepo, add a"
            echo "\`pyproject.toml\` at the repo root with the \`ceo-audit\`"
            echo "dev-dependency and re-run this workflow."
          } > report.md
          exit 0

      - name: Setup Python
        if: steps.detect.outputs.is_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SIN-Code Bundle (with ceo-audit skill)
        if: steps.detect.outputs.is_python == 'true'
        run: pip install "sin-code-bundle[ceo-audit,dev]"

      - name: Run CEO Audit
        if: steps.detect.outputs.is_python == 'true'
        id: audit
        run: |
          sin ceo-audit run . \
            --profile="$AUDIT_PROFILE" \
            --grade="$AUDIT_GRADE" \
            --format=sarif,md,html,json || echo "Audit exited non-zero; continuing to upload partial report."

      - name: Upload SARIF to Code Scanning
        if: always() && hashFiles('report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: report.sarif
        continue-on-error: true

      - name: Upload full report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ceo-audit-report
          path: |
            report.md
            report.sarif
            report.html
            report.json
          retention-days: 30
        continue-on-error: true

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request' && always() && hashFiles('report.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ceo-audit
          path: report.md
        continue-on-error: true
