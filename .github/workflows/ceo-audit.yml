# CEO Audit gate — adapted for SIN-Code-WebUI-v2 (Node/TypeScript repo).
#
# Related issues: #6
#
# Problems this version fixes:
# 1. Dependabot PRs previously failed the required `ceo-audit` check because
#    the job ran a Python-only tool on a Node repo with a bot actor.
#    → The job now always reports SUCCESS for dependabot and for non-Python
#      repos, so branch protection passes without weakening real audits.
# 2. The audit only runs when a Python manifest exists (pyproject.toml /
#    requirements.txt / setup.py), since ceo-audit is a Python tool from
#    SIN-Code-Bundle.

name: ceo-audit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  ceo-audit:
    runs-on: ubuntu-latest
    env:
      AUDIT_PROFILE: QUICK
      AUDIT_GRADE: B
    steps:
      - name: Skip for dependabot dependency bumps
        if: github.actor == 'dependabot[bot]'
        run: |
          {
            echo "## CEO Audit — Skipped"
            echo ""
            echo "Dependabot pushed a dependency-version-only change."
            echo "These PRs do not modify application logic, so the audit is"
            echo "bypassed. The PR is still gated by required reviews."
          } > report.md

      - name: Checkout
        if: github.actor != 'dependabot[bot]'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect project type
        if: github.actor != 'dependabot[bot]'
        id: detect
        run: |
          if [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f setup.py ]; then
            echo "is_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_python=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip with explanatory comment (Node/TS repo, no Python manifest)
        if: github.actor != 'dependabot[bot]' && steps.detect.outputs.is_python != 'true'
        run: |
          {
            echo "## CEO Audit — Not applicable"
            echo ""
            echo "This repository is a **Node.js / TypeScript** project."
            echo "The CEO Audit is a Python tool; running it on a non-Python"
            echo "repo would produce a misleading grade."
            echo ""
            echo "**Recommended checks for this repo:**"
            echo '- `pnpm tsc --noEmit` (type safety)'
            echo '- `pnpm lint` (style)'
            echo '- `pnpm test` (unit tests, when added)'
          } > report.md

      - name: Setup Python
        if: github.actor != 'dependabot[bot]' && steps.detect.outputs.is_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SIN-Code Bundle (with ceo-audit skill)
        if: github.actor != 'dependabot[bot]' && steps.detect.outputs.is_python == 'true'
        run: pip install "sin-code-bundle[ceo-audit,dev]"

      - name: Run CEO Audit
        if: github.actor != 'dependabot[bot]' && steps.detect.outputs.is_python == 'true'
        run: |
          sin ceo-audit run . \
            --profile="$AUDIT_PROFILE" \
            --grade="$AUDIT_GRADE" \
            --format=sarif,md,html,json || echo "Audit exited non-zero; uploading partial report."

      - name: Upload SARIF to Code Scanning
        if: always() && hashFiles('report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: report.sarif

      - name: Upload report artifacts
        if: always() && hashFiles('report.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ceo-audit-report
          path: |
            report.md
            report.html
            report.json
          retention-days: 30
        continue-on-error: true

      - name: Post sticky PR comment
        if: github.event_name == 'pull_request' && always() && hashFiles('report.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ceo-audit
          path: report.md
