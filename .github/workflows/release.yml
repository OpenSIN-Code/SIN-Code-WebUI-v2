# Purpose: Fixed release pipeline (release-drafter@v5 + Python build + PyPI publish)
# Docs: https://github.com/release-drafter/release-drafter
#
# This is the FIXED version of the release.yml that failed 3x in SIN-Code-Bundle.
# The original had three bugs:
#   1. No `permissions: contents: write` (couldn't create GitHub releases)
#   2. Default fetch-depth (release-drafter needs full history)
#   3. No explicit `actions/setup-python@v5` (relied on global python3)
#
# All three are fixed below. Triggered on tag push (v*).
#
# Required secrets: PYPI_TOKEN (optional — omit the publish step if not set)
# Triggers: push tags matching 'v*'

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run (no PyPI publish, no GitHub release)'
        required: false
        default: 'false'

permissions:
  contents: write  # FIX #1: explicit write so the job can create releases
  id-token: write  # required for PyPI trusted publishing (OIDC)

jobs:
  draft:
    name: Update changelog + draft release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # FIX #2: full history for release-drafter

      - name: Release Drafter
        uses: release-drafter/release-drafter@v5  # was v3 in the broken version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: draft
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5  # FIX #3: explicit, pinned Python setup
        with:
          python-version: '3.12'

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && github.event.inputs.dry_run != 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/${{ github.event.repository.name }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via OIDC (preferred)
        if: env.PYPI_TOKEN == ''
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no token needed in secrets

      - name: Publish to PyPI via token (fallback)
        if: env.PYPI_TOKEN != ''
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m twine upload dist/* \
            --username __token__ \
            --password "$PYPI_TOKEN"
